<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
        <div id="box">
            <h2 id="ques"></h2>
            <div class="row">
                <input type="radio" id="option1" value="a" name="option" class="options">
                <label for="option1"></label>
            </div>
            <div class="row">
                <input type="radio" value="b" id="option2" name="option" class="options">
                <label for="option2"></label>
            </div>
            <div class="row">
                <input type="radio" value="c" id="option3" name="option" class="options">
                <label for="option3"></label>
            </div>
            <div class="row">
                <input type="radio" value="d" id="option4" name="option" class="options">
                <label for="option4"></label>
            </div>
                <button class="btn" onclick="submitQuiz()">Submit</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
